<script type="module">
import * as THREE from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

// ─────────────────────────────────────────────────────────────
//  THEMES
// ─────────────────────────────────────────────────────────────
const THEMES = [
  {
    name:  'NEBULA BLUE',
    inner: new THREE.Color('#3388ff'),
    mid:   new THREE.Color('#993388'),
    outer: new THREE.Color('#ff6622'),
    core:  new THREE.Color('#bbddff'),
    bloom: [0.85, 0.45, 0.08],
  },
  {
    name:  'COSMIC ROSE',
    inner: new THREE.Color('#ff44cc'),
    mid:   new THREE.Color('#7733ff'),
    outer: new THREE.Color('#22aaff'),
    core:  new THREE.Color('#ffd0ff'),
    bloom: [0.85, 0.45, 0.08],
  },
  {
    name:  'EMERALD VOID',
    inner: new THREE.Color('#22ff88'),
    mid:   new THREE.Color('#119944'),
    outer: new THREE.Color('#ff3333'),
    core:  new THREE.Color('#aaffd0'),
    bloom: [0.85, 0.45, 0.08],
  },
];

let themeIdx = 0;

// ─────────────────────────────────────────────────────────────
//  RENDERER
// ─────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({
  antialias: false,
  powerPreference: 'high-performance',
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping    = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.65;
renderer.outputColorSpace    = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─────────────────────────────────────────────────────────────
//  SCENE / CAMERA
// ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  60, window.innerWidth / window.innerHeight, 0.1, 2000
);
camera.position.set(0, 38, 118);  // lower angle — see the disk edge-on drama
camera.lookAt(0, 0, 0);

// ─────────────────────────────────────────────────────────────
//  POST-PROCESSING
// ─────────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.85, 0.45, 0.08   // tighter radius = crisper glow, no bleed
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ─────────────────────────────────────────────────────────────
//  ORBIT CONTROLS
// ─────────────────────────────────────────────────────────────
const orbit = new OrbitControls(camera, renderer.domElement);
orbit.enableDamping    = true;
orbit.dampingFactor    = 0.04;
orbit.minDistance      = 18;
orbit.maxDistance      = 400;
orbit.autoRotate       = true;
orbit.autoRotateSpeed  = 0.15;  // slow, cinematic drift

// ─────────────────────────────────────────────────────────────
//  SHADERS
// ─────────────────────────────────────────────────────────────
const VERT = /* glsl */`
  attribute float aAngle;
  attribute float aRadius;
  attribute float aY;
  attribute float aSize;
  attribute vec3  aColor;
  attribute float aTwinkle;
  attribute float aBrownFreq;
  attribute float aBrownAmp;
  attribute float aBrownPhase;

  uniform float uTime;
  uniform float uSpeed;
  uniform vec3  uGrav;
  uniform float uGravStr;
  uniform float uPulse;

  varying vec3  vColor;
  varying float vAlpha;

  void main() {
    // ── Vortex rotation: inner slower, outer faster ───────────────
    float rNorm = clamp(aRadius / 50.0, 0.0, 1.0);
    float omega  = uSpeed * (0.04 + pow(rNorm, 0.55) * 0.86);
    float theta  = aAngle + uTime * omega;

    // ── Flat disk position ────────────────────────────────────────
    vec3 p;
    p.x = cos(theta) * aRadius;
    p.z = sin(theta) * aRadius;
    p.y = aY;

    // ── Swirl: spiral inward drift — each particle slowly corkscrews
    // toward the core then gets repelled, giving a continuous swirl motion
    float swirlPhase = uTime * 0.28 + aAngle * 0.7 + aRadius * 0.055;
    float swirlAmt   = sin(swirlPhase) * 0.55 * (1.0 - rNorm * 0.6);
    // Tangential direction in XZ (perpendicular to radial) rotated 90°
    vec2 radialDir = normalize(p.xz);
    vec2 tangent   = vec2(-radialDir.y, radialDir.x);
    // Blend radial inward + tangential to create a curl
    p.xz += (tangent * swirlAmt - radialDir * swirlAmt * 0.35);

    // Brownian motion — disk-plane only (XZ), tiny Y flutter
    float bx = sin(uTime * aBrownFreq         + aBrownPhase)
             + sin(uTime * aBrownFreq * 1.618  + aBrownPhase * 2.3) * 0.4;
    float bz = sin(uTime * aBrownFreq * 1.325  + aBrownPhase * 1.1)
             + sin(uTime * aBrownFreq * 0.765  + aBrownPhase * 3.7) * 0.4;
    float by = sin(uTime * aBrownFreq * 2.0    + aBrownPhase * 0.9) * 0.25;
    p += vec3(bx, by, bz) * aBrownAmp;

    // Gravity well
    vec3  dg   = uGrav - p;
    float dLen = length(dg);
    if (dLen < 38.0 && uGravStr > 0.001) {
      float f = pow(1.0 - dLen / 38.0, 2.0) * uGravStr * 18.0;
      p += normalize(dg) * f;
    }

    // BH repulsion — disk-plane only so particles arc around it cleanly
    float bhR = length(p.xz);
    if (bhR < 8.0 && bhR > 0.01) {
      float f = pow(1.0 - bhR / 8.0, 2.5) * 22.0;
      p.xz += (p.xz / bhR) * f;
    }

    // Subtle pulse ripple outward from core
    float pulse = sin(uTime * 1.8 - aRadius * 0.22) * 0.008 * uPulse;
    p.y += pulse;

    // ── Speed-based colour: black (core) → blue → purple → red ──
    // Tangential speed = omega * r; normalise so outer edge ≈ 1.0
    float speedT = clamp((omega * aRadius) / (uSpeed * 44.0), 0.0, 1.0);

    // Black → deep blue → royal blue → violet/purple → crimson → bright red
    // No green or yellow — pure black-blue-red spectrum
    vec3 speedCol;
    if (speedT < 0.20) {
      // black → deep blue
      speedCol = mix(vec3(0.00, 0.00, 0.00), vec3(0.00, 0.03, 0.55), speedT / 0.20);
    } else if (speedT < 0.45) {
      // deep blue → royal blue
      speedCol = mix(vec3(0.00, 0.03, 0.55), vec3(0.08, 0.15, 1.00), (speedT - 0.20) / 0.25);
    } else if (speedT < 0.68) {
      // royal blue → violet-purple
      speedCol = mix(vec3(0.08, 0.15, 1.00), vec3(0.55, 0.05, 0.70), (speedT - 0.45) / 0.23);
    } else if (speedT < 0.85) {
      // violet-purple → deep crimson
      speedCol = mix(vec3(0.55, 0.05, 0.70), vec3(0.90, 0.03, 0.12), (speedT - 0.68) / 0.17);
    } else {
      // deep crimson → bright red
      speedCol = mix(vec3(0.90, 0.03, 0.12), vec3(1.00, 0.10, 0.02), (speedT - 0.85) / 0.15);
    }

    // Retain per-particle brightness variation baked into aColor
    float luma = dot(aColor, vec3(0.299, 0.587, 0.114));
    float bri  = 0.55 + 0.45 * luma;
    vColor = speedCol * bri;

    // Particles near BH fade blue → black
    float bhDist    = length(p.xz);
    float proximity = 1.0 - smoothstep(2.8, 16.0, bhDist);
    // Blend toward deep blue first, then to black
    vec3 nearColor = mix(vec3(0.0, 0.02, 0.18), vec3(0.0, 0.0, 0.0), pow(proximity, 1.5));
    vColor = mix(vColor, nearColor, proximity);

    // Twinkle
    vAlpha = 0.55 + 0.45 * sin(uTime * aTwinkle + aAngle * 2.7);

    vec4 mv = modelViewMatrix * vec4(p, 1.0);
    gl_Position = projectionMatrix * mv;

    float d = clamp(-mv.z, 1.0, 800.0);
    gl_PointSize = clamp(aSize * 340.0 / d, 0.2, 16.0);
  }
`;

const FRAG = /* glsl */`
  varying vec3  vColor;
  varying float vAlpha;

  void main() {
    vec2  uv   = gl_PointCoord - 0.5;
    float dist = length(uv);
    if (dist > 0.5) discard;

    float core = 1.0 - smoothstep(0.0, 0.15, dist);
    float halo = pow(max(0.0, 1.0 - dist * 2.0), 2.8);
    float a    = (core * 0.88 + halo * 0.12) * vAlpha;

    // Slightly overbright core for bloom to catch
    vec3 col = vColor * (1.0 + core * 2.2);

    gl_FragColor = vec4(col, a);
  }
`;

// ─────────────────────────────────────────────────────────────
//  JET SHADERS
// ─────────────────────────────────────────────────────────────
const JET_VERT = /* glsl */`
  attribute float aPhase;
  attribute float aJetDir;
  attribute float aSpread;
  attribute float aSpreadAngle;

  uniform float uTime;
  uniform vec3  uJetHot;
  uniform vec3  uJetCool;

  varying vec3  vColor;
  varying float vAlpha;

  void main() {
    float period = 4.8;
    float t = mod(uTime * 0.85 + aPhase * period, period) / period; // 0→1

    // Accelerating column — tight near BH, spreads further out
    float dist   = pow(t, 1.25) * 110.0;
    float spread = t * t * aSpread;

    vec3 p;
    p.x = cos(aSpreadAngle) * spread;
    p.z = sin(aSpreadAngle) * spread;
    p.y = dist * aJetDir;

    // Hot white at base → cool theme colour further out
    vColor = mix(uJetHot, uJetCool, pow(t, 0.7));

    // Flicker + fade with distance — overall dimmed so jets don't blur
    float flicker = 0.82 + 0.18 * sin(uTime * 14.0 + aPhase * 53.0);
    vAlpha = pow(1.0 - t, 1.8) * flicker * 0.38;

    vec4 mv = modelViewMatrix * vec4(p, 1.0);
    gl_Position = projectionMatrix * mv;
    float d = clamp(-mv.z, 1.0, 800.0);
    // Bigger particles near the throat, shrink as they travel
    gl_PointSize = clamp((1.4 + (1.0 - t) * 3.2) * 270.0 / d, 0.3, 14.0);
  }
`;

const JET_FRAG = /* glsl */`
  varying vec3  vColor;
  varying float vAlpha;

  void main() {
    vec2  uv   = gl_PointCoord - 0.5;
    float dist = length(uv);
    if (dist > 0.5) discard;
    float glow = pow(max(0.0, 1.0 - dist * 2.0), 2.0);
    gl_FragColor = vec4(vColor, glow * vAlpha);
  }
`;

// ─────────────────────────────────────────────────────────────
//  BLACK HOLE SHADERS
// ─────────────────────────────────────────────────────────────
const BH_VERT = /* glsl */`
  void main() {
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const BH_FRAG = /* glsl */`
  void main() {
    gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
  }
`;

// ─────────────────────────────────────────────────────────────
//  NEBULA TEXTURE GENERATOR
// ─────────────────────────────────────────────────────────────
function makeNebulaTex(color) {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const { r, g, b } = color;
  const rgba = `rgba(${~~(r*255)},${~~(g*255)},${~~(b*255)}`;
  const grd  = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
  grd.addColorStop(0,   rgba + ',1)');
  grd.addColorStop(0.4, rgba + ',0.4)');
  grd.addColorStop(1,   rgba + ',0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, 256, 256);
  return new THREE.CanvasTexture(c);
}

// ─────────────────────────────────────────────────────────────
//  SCENE OBJECTS
// ─────────────────────────────────────────────────────────────
const N = 100000;
let galaxyPts = null, galaxyMat = null;
let jetPts    = null, jetMat    = null;
let coreGroup   = new THREE.Group();
let nebulaGroup = new THREE.Group();
let bhGroup     = new THREE.Group();
scene.add(coreGroup);
scene.add(nebulaGroup);
scene.add(bhGroup);
let simSpeed = 0.42;

// ── Galaxy ────────────────────────────────────────────────────
function buildGalaxy(theme) {
  if (galaxyPts) {
    scene.remove(galaxyPts);
    galaxyPts.geometry.dispose();
    galaxyMat.dispose();
  }

  const angles     = new Float32Array(N);
  const radii      = new Float32Array(N);
  const ys         = new Float32Array(N);
  const sizes      = new Float32Array(N);
  const colors     = new Float32Array(N * 3);
  const twinks     = new Float32Array(N);
  const brownFreq  = new Float32Array(N);
  const brownAmp   = new Float32Array(N);
  const brownPhase = new Float32Array(N);
  const dummyP     = new Float32Array(N * 3);

  const ARMS = 2;      // two-armed spiral — cleaner, more elegant
  const RMAX = 50;
  const SPIN = 2.2;    // tighter wind for crisper arms

  for (let i = 0; i < N; i++) {
    const inCore = Math.random() < 0.08;
    let r, baseAngle;

    if (inCore) {
      r         = Math.pow(Math.random(), 1.5) * 4;
      baseAngle = Math.random() * Math.PI * 2;
    } else {
      r             = Math.pow(Math.random(), 0.6) * RMAX;
      const arm     = Math.floor(Math.random() * ARMS);
      const armOff  = (arm / ARMS) * Math.PI * 2;
      const spiral  = r * SPIN * (0.92 + Math.random() * 0.16);
      // scatter tightens toward center, widens at edge
      const scatter = (Math.random() - 0.5) * Math.pow(r / RMAX, 0.6) * 0.55;
      baseAngle     = armOff + spiral + scatter;
    }

    radii[i]  = Math.max(0, r + (Math.random() - 0.5) * 0.4);
    angles[i] = baseAngle;

    // 3-D disc: thick bulge at centre, tapers smoothly to razor-thin edge
    // Profile: Gaussian-ish sech² envelope — tallest at core, ~0.18 at rim
    const rFrac  = r / RMAX;                              // 0 → 1
    const bulge  = Math.exp(-rFrac * rFrac * 3.2);        // 1.0 → ~0.04
    const hRange = inCore
      ? 3.8                                               // galactic bulge
      : 0.18 + bulge * 40.2;                              // disk: thick→thin
    ys[i] = (Math.random() - 0.5) * hRange;

    // Arm particles slightly smaller for crispness
    sizes[i] = inCore
      ? Math.random() * 2.8 + 1.2
      : Math.random() * 1.4 + 0.3;

    // Brightness variation baked into aColor (speed drives hue in shader)
    const bri = 0.55 + Math.random() * 0.45;
    colors[i*3] = colors[i*3+1] = colors[i*3+2] = bri;

    twinks[i] = Math.random() * 4.0 + 0.5;

    // Very subtle Brownian — just enough to feel alive, not jittery
    const brownScale = 0.018 + (r / RMAX) * 0.06;
    brownFreq[i]  = Math.random() * 1.4 + 0.3;
    brownAmp[i]   = brownScale * (Math.random() * 0.5 + 0.75);
    brownPhase[i] = Math.random() * Math.PI * 2;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(dummyP, 3));
  geo.setAttribute('aAngle',      new THREE.BufferAttribute(angles,     1));
  geo.setAttribute('aRadius',     new THREE.BufferAttribute(radii,      1));
  geo.setAttribute('aY',          new THREE.BufferAttribute(ys,         1));
  geo.setAttribute('aSize',       new THREE.BufferAttribute(sizes,      1));
  geo.setAttribute('aColor',      new THREE.BufferAttribute(colors,     3));
  geo.setAttribute('aTwinkle',    new THREE.BufferAttribute(twinks,     1));
  geo.setAttribute('aBrownFreq',  new THREE.BufferAttribute(brownFreq,  1));
  geo.setAttribute('aBrownAmp',   new THREE.BufferAttribute(brownAmp,   1));
  geo.setAttribute('aBrownPhase', new THREE.BufferAttribute(brownPhase, 1));

  galaxyMat = new THREE.ShaderMaterial({
    vertexShader:   VERT,
    fragmentShader: FRAG,
    uniforms: {
      uTime:    { value: 0 },
      uSpeed:   { value: simSpeed },
      uGrav:    { value: new THREE.Vector3(9999, 0, 9999) },
      uGravStr: { value: 0 },
      uPulse:   { value: 1.0 },
    },
    transparent: true,
    depthWrite:  false,
    blending:    THREE.AdditiveBlending,
  });

  galaxyPts = new THREE.Points(geo, galaxyMat);
  scene.add(galaxyPts);
}

// ── Black Hole ────────────────────────────────────────────────
function buildBlackHole(theme) {
  bhGroup.clear();

  // Pitch black sphere — small, clean, no rings
  bhGroup.add(new THREE.Mesh(
    new THREE.SphereGeometry(2.8, 48, 48),
    new THREE.ShaderMaterial({
      vertexShader:   BH_VERT,
      fragmentShader: BH_FRAG,
      transparent: false,
      depthWrite: true,
    })
  ));
}

// ── Bipolar Jets ──────────────────────────────────────────────
const N_JET = 7000; // 3500 per pole

function buildJets(theme) {
  if (jetPts) { scene.remove(jetPts); jetPts.geometry.dispose(); jetMat.dispose(); }

  const phases     = new Float32Array(N_JET);
  const dirs       = new Float32Array(N_JET);
  const spreads    = new Float32Array(N_JET);
  const spreadAngs = new Float32Array(N_JET);
  const dummyP     = new Float32Array(N_JET * 3);

  for (let i = 0; i < N_JET; i++) {
    phases[i]     = Math.random();
    dirs[i]       = i < N_JET / 2 ? 1.0 : -1.0;
    spreads[i]    = Math.random() * 5.5 + 0.2;
    spreadAngs[i] = Math.random() * Math.PI * 2;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',     new THREE.BufferAttribute(dummyP,     3));
  geo.setAttribute('aPhase',       new THREE.BufferAttribute(phases,     1));
  geo.setAttribute('aJetDir',      new THREE.BufferAttribute(dirs,       1));
  geo.setAttribute('aSpread',      new THREE.BufferAttribute(spreads,    1));
  geo.setAttribute('aSpreadAngle', new THREE.BufferAttribute(spreadAngs, 1));

  jetMat = new THREE.ShaderMaterial({
    vertexShader:   JET_VERT,
    fragmentShader: JET_FRAG,
    uniforms: {
      uTime:    { value: 0 },
      uJetHot:  { value: new THREE.Color('#ffffff') },       // white at throat
      uJetCool: { value: new THREE.Color('#cc1100') },       // deep red at tips
    },
    transparent: true,
    depthWrite:  false,
    blending:    THREE.AdditiveBlending,
  });

  jetPts = new THREE.Points(geo, jetMat);
  scene.add(jetPts);
}

// ── Nebula Clouds ─────────────────────────────────────────────
function buildNebula(theme) {
  nebulaGroup.clear();

  const configs = [
    { pos: [-16, 6, -8],   size: 85,  color: theme.inner, op: 0.13 },
    { pos: [20, -4, 18],   size: 70,  color: theme.outer, op: 0.10 },
    { pos: [-4, 10, 28],   size: 95,  color: theme.mid,   op: 0.09 },
    { pos: [28, 2, -18],   size: 60,  color: theme.inner.clone().lerp(theme.core, 0.4), op: 0.08 },
    { pos: [-28, -6, 8],   size: 80,  color: theme.outer.clone().lerp(theme.mid, 0.5), op: 0.07 },
    { pos: [5, -12, -30],  size: 110, color: theme.mid.clone().lerp(theme.inner, 0.3), op: 0.06 },
  ];

  configs.forEach(({ pos, size, color, op }) => {
    const mat = new THREE.SpriteMaterial({
      map: makeNebulaTex(color),
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      opacity: op,
    });
    const sprite = new THREE.Sprite(mat);
    sprite.position.set(...pos);
    sprite.scale.set(size, size, 1);
    nebulaGroup.add(sprite);
  });
}

// ── Background Stars ──────────────────────────────────────────
function buildBgStars() {
  const CNT = 5000;
  const pos = new Float32Array(CNT * 3);
  for (let i = 0; i < CNT; i++) {
    const u = Math.random(), v = Math.random();
    const th = 2 * Math.PI * u;
    const ph = Math.acos(2 * v - 1);
    const r  = 480 + Math.random() * 200;
    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
    pos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
    pos[i*3+2] = r * Math.cos(ph);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.55,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.55,
  });
  scene.add(new THREE.Points(geo, mat));
}

// ─────────────────────────────────────────────────────────────
//  MOUSE / GRAVITY  (click + hold to activate)
// ─────────────────────────────────────────────────────────────
const mouse2    = new THREE.Vector2();
const raycaster = new THREE.Raycaster();
const yPlane    = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const gPoint    = new THREE.Vector3();
let   gravStr   = 0;
let   pressing  = false;

const gravHint = document.getElementById('gravity-hint');

renderer.domElement.addEventListener('mousemove', e => {
  mouse2.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse2.y = -(e.clientY / window.innerHeight) * 2 + 1;
  gravHint.style.left = e.clientX + 'px';
  gravHint.style.top  = e.clientY + 'px';
});
renderer.domElement.addEventListener('mousedown',  () => { pressing = true;  gravHint.classList.add('active'); window.posthog?.capture('gravity_well_activated'); });
renderer.domElement.addEventListener('mouseup',    () => { pressing = false; gravHint.classList.remove('active'); });
renderer.domElement.addEventListener('mouseenter', () => { gravHint.style.opacity = '1'; });
renderer.domElement.addEventListener('mouseleave', () => { gravHint.style.opacity = '0'; pressing = false; gravHint.classList.remove('active'); });
window.addEventListener('blur',                    () => { pressing = false; gravHint.classList.remove('active'); });

function tickGravity() {
  if (!galaxyMat) return;
  raycaster.setFromCamera(mouse2, camera);
  raycaster.ray.intersectPlane(yPlane, gPoint);
  gravStr += ((pressing ? 1.0 : 0) - gravStr) * 0.07;
  galaxyMat.uniforms.uGrav.value.copy(gPoint);
  galaxyMat.uniforms.uGravStr.value = gravStr;
}

//  KEYBOARD
// ─────────────────────────────────────────────────────────────
const themeEl = document.getElementById('theme-label');
const fpsEl   = document.getElementById('fps-label');

function applyTheme(idx) {
  themeIdx = idx;
  const t = THEMES[idx];
  buildGalaxy(t);
  buildBlackHole(t);
  buildNebula(t);
  buildJets(t);
  themeEl.textContent    = t.name;
  bloom.strength         = t.bloom[0];
  bloom.radius           = t.bloom[1];
  bloom.threshold        = t.bloom[2];
  window.posthog?.capture('theme_changed', { theme: t.name, theme_index: idx });
}

// ── Arrow-key rocket steering ─────────────────────────────────
const rktKeys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
const dkEls = {
  ArrowUp:    document.getElementById('dk-up'),
  ArrowDown:  document.getElementById('dk-down'),
  ArrowLeft:  document.getElementById('dk-left'),
  ArrowRight: document.getElementById('dk-right'),
};
function syncDpad() {
  for (const [k, el] of Object.entries(dkEls)) el.classList.toggle('pressed', rktKeys[k]);
}
window.addEventListener('keyup', e => { if (e.key in rktKeys) { rktKeys[e.key] = false; syncDpad(); } });

window.addEventListener('keydown', e => {
  if (e.key in rktKeys) { e.preventDefault(); rktKeys[e.key] = true; syncDpad(); return; }
  if (e.key === '1') applyTheme(0);
  if (e.key === '2') applyTheme(1);
  if (e.key === '3') applyTheme(2);
  if (e.key === '+' || e.key === '=') {
    simSpeed = Math.min(simSpeed * 1.3, 5.0);
    if (galaxyMat) galaxyMat.uniforms.uSpeed.value = simSpeed;
  }
  if (e.key === '-' || e.key === '_') {
    simSpeed = Math.max(simSpeed * 0.77, 0.02);
    if (galaxyMat) galaxyMat.uniforms.uSpeed.value = simSpeed;
  }
  if (e.key === 'c' || e.key === 'C') {
    rktAutoCourse = !rktAutoCourse;
    const ccCtrl = document.querySelector('.ctrl-cc');
    if (ccCtrl) ccCtrl.classList.toggle('active', rktAutoCourse);
    window.posthog?.capture('auto_course_correction_toggled', { enabled: rktAutoCourse });
  }
  if (e.key === 'f' || e.key === 'F'){
     setFollowCam(!followCam);
     const ccCtrl2 = document.querySelector('.ctrl-cc-2');
     if (ccCtrl2) ccCtrl2.classList.toggle('active', followCam);
  }

  if (e.key === ' ') {
    e.preventDefault();
    setFollowCam(false);
    camera.position.set(0, 38, 118);
    camera.lookAt(0, 0, 0);
    orbit.reset();
  }
});

// ─────────────────────────────────────────────────────────────
//  ROCKET
// ─────────────────────────────────────────────────────────────
const ROCKET_GM   = 14000;  // gravitational parameter — controls orbit speed
const TRAIL_MAX   = 600;    // max trail positions stored
const TRAIL_EVERY = 3;      // record position every N frames

// Physics state — 45° tilted orbit
// Start at aphelion on the +X axis; velocity is in the plane tilted 45° in YZ.
// Plane normal = normalise((0,122,0)×(0,6.44,-6.44)) = (0, 0.707, 0.707)
const rktPos = new THREE.Vector3(85, 0, 0);
const rktVel = new THREE.Vector3(0, 6.44, -6.44);   // tangential, 45° tilted

// Store the orbital-plane normal at t=0 so the rocket can fight its way back
const rktL0 = new THREE.Vector3()
  .crossVectors(rktPos, rktVel)
  .normalize();   // ≈ (0, 0.707, 0.707)

let   rktTick = 0;
let   rktFighting = false;   // true while actively correcting course

// ── Maneuver state ────────────────────────────────────────────
let   rktAutoCourse = false;      // C key toggle — auto course correction
let   rktPrevGrav = false;        // was gravity active last frame
let   rktManeuverTime = 0;        // seconds left in current maneuver
let   rktManeuverMode = null;     // 'perp' | 'toward'
const RKT_MANEUVER_DUR = 1;    // duration of each maneuver (seconds)
const RKT_BH_GRAV_RADIUS = 30;   // BH proximity threshold

// ── Trail ─────────────────────────────────────────────────────
const rktTrail  = [];
const rktTrBuf  = new Float32Array(TRAIL_MAX * 3);
const rktTrGeo  = new THREE.BufferGeometry();
const rktTrAttr = new THREE.BufferAttribute(rktTrBuf, 3);
rktTrGeo.setAttribute('position', rktTrAttr);
rktTrGeo.setDrawRange(0, 1);

const rktTrLine = new THREE.Line(
  rktTrGeo,
  new THREE.LineDashedMaterial({
    color: 0x99aaff,
    dashSize: 4.5,
    gapSize:  3.0,
    transparent: true,
    opacity: 0.45,
    depthWrite: false,
  })
);
scene.add(rktTrLine);

// ── Rocket mesh ───────────────────────────────────────────────
const rktGroup = new THREE.Group();
scene.add(rktGroup);

const _matSilver = new THREE.MeshBasicMaterial({ color: 0xddeeff });
const _matNose   = new THREE.MeshBasicMaterial({ color: 0xffffff });
const _matFin    = new THREE.MeshBasicMaterial({ color: 0x8899bb });
const _matExh    = new THREE.MeshBasicMaterial({
  color: new THREE.Color(3.5, 1.2, 0.15),   // overbright — bloom catches it
  transparent: true, opacity: 0.92,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const _matCore   = new THREE.MeshBasicMaterial({
  color: new THREE.Color(5, 5, 5),            // pure white bloom core
  transparent: true, opacity: 0.95,
  blending: THREE.AdditiveBlending, depthWrite: false,
});

// Body
rktGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.52, 2.8, 10), _matSilver));

// Nose cone
const _nose = new THREE.Mesh(new THREE.ConeGeometry(0.42, 1.5, 10), _matNose);
_nose.position.y = 2.15;
rktGroup.add(_nose);

// 3 fins at base
for (let i = 0; i < 3; i++) {
  const ang = (i / 3) * Math.PI * 2;
  const fin = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.95, 0.65), _matFin);
  fin.position.set(Math.cos(ang) * 0.58, -1.05, Math.sin(ang) * 0.58);
  fin.rotation.y = -ang;
  rktGroup.add(fin);
}

// Exhaust plume (wide)
const _exhPlume = new THREE.Mesh(new THREE.ConeGeometry(0.38, 2.0, 10), _matExh);
_exhPlume.position.y = -2.3;
_exhPlume.rotation.x = Math.PI;
rktGroup.add(_exhPlume);

// Exhaust inner bright core
const _exhCore = new THREE.Mesh(new THREE.ConeGeometry(0.14, 1.0, 8), _matCore);
_exhCore.position.y = -2.05;
_exhCore.rotation.x = Math.PI;
rktGroup.add(_exhCore);

// Reusable vectors (avoid per-frame alloc)
const _rktUp  = new THREE.Vector3(0, 1, 0);
const _rktDir = new THREE.Vector3();
const _rktDG  = new THREE.Vector3();

function updateRocket(dt) {
  // ── BH gravity (inverse-square from origin) ───────────────────
  const r = rktPos.length();
  if (r <= 2.8) {
    // Inside event horizon — swallowed, gone forever
    rktGroup.visible  = false;
    rktTrLine.visible = false;
    if (followCam) setFollowCam(false);
    window.posthog?.capture('rocket_swallowed_by_blackhole');
    return;
  }
  const g = ROCKET_GM / (r * r);
  rktVel.addScaledVector(rktPos, -g * dt / r);

  // ── Click gravity — rocket partially resists (fighter pilot) ──
  // It doesn't go quietly: only 38% of the gravity force gets through.
  if (gravStr > 0.01) {
    _rktDG.copy(gPoint).sub(rktPos);
    const d = _rktDG.length();
    if (d < 38 && d > 0.1) {
      const f = Math.pow(1 - d / 38, 2) * gravStr * 320 * dt * 0.38;
      rktVel.addScaledVector(_rktDG.normalize(), f);
    }
    rktFighting = false;   // being pulled — not yet fighting back
  } else {
    rktFighting = true;
  }

  // ── Maneuver transition — detect entering / leaving gravity ──
  const gravActive = gravStr > 0.01 || r < RKT_BH_GRAV_RADIUS;
  if (rktAutoCourse) {
    if (gravActive && !rktPrevGrav) {
      // Entering gravity → turn perpendicular to radial for 5 s
      rktManeuverTime = RKT_MANEUVER_DUR;
      rktManeuverMode = 'perp';
    } else if (!gravActive && rktPrevGrav) {
      // Escaping gravity → turn toward the BH for 5 s
      rktManeuverTime = RKT_MANEUVER_DUR;
      rktManeuverMode = 'toward';
    }
  } else {
    // Auto course correction off — cancel any active maneuver
    rktManeuverTime = 0;
    rktManeuverMode = null;
  }
  rktPrevGrav = gravActive;

  // ── Integrate ─────────────────────────────────────────────────
  rktPos.addScaledVector(rktVel, dt);

  // ── Arrow-key steering ────────────────────────────────────────
  const isSteerig = rktKeys.ArrowUp || rktKeys.ArrowDown || rktKeys.ArrowLeft || rktKeys.ArrowRight;
  if (isSteerig) {
    const spd0   = rktVel.length();
    const fwdDir = rktVel.clone().normalize();          // rocket's current heading

    // Build a local right axis: fwd × world-up (fallback to fwd × world-Z)
    const worldUp  = new THREE.Vector3(0, 1, 0);
    let   rightDir = new THREE.Vector3().crossVectors(fwdDir, worldUp);
    if (rightDir.lengthSq() < 0.001) rightDir.set(1, 0, 0);
    rightDir.normalize();

    // Local up relative to the rocket's own frame
    const upDir = new THREE.Vector3().crossVectors(rightDir, fwdDir).normalize();

    const STEER = 11.0 * dt;   // degrees-of-effect per frame — gentle but noticeable
    if (rktKeys.ArrowUp)    rktVel.addScaledVector(upDir,    STEER);
    if (rktKeys.ArrowDown)  rktVel.addScaledVector(upDir,   -STEER);
    if (rktKeys.ArrowLeft)  rktVel.addScaledVector(rightDir,-STEER);
    if (rktKeys.ArrowRight) rktVel.addScaledVector(rightDir, STEER);

    // Preserve speed — steering only rotates the velocity vector
    rktVel.normalize().multiplyScalar(spd0);

    // Update the stored orbital plane normal so the autopilot tracks the new course
    rktL0.crossVectors(rktPos, rktVel).normalize();
  }

  // ── 5-second maneuver steering ────────────────────────────────
  // Entering gravity  → gradually turn perpendicular to rocket→BH vector
  // Escaping gravity   → gradually turn toward the black hole
  if (rktManeuverTime > 0 && !isSteerig) {
    rktManeuverTime -= dt;
    const blend    = Math.max(0, rktManeuverTime / RKT_MANEUVER_DUR); // 1→0
    const steerRate = blend * 1.0 * dt;   // fades out over 5 seconds

    const spd0 = rktVel.length();

    if (rktManeuverMode === 'toward') {
      // Target direction: straight at the black hole (origin)
      
      const toBH = rktPos.clone().negate().normalize().multiplyScalar(spd0);
      rktVel.lerp(toBH, steerRate);
    }

    // Preserve orbital speed — maneuver only rotates, doesn't accelerate
    rktVel.normalize().multiplyScalar(spd0);
  }

  // ── Light out-of-plane damping (keep orbit tidy) ──────────────
  if (!isSteerig) {
    const vPerp = rktVel.dot(rktL0);
    const rPerp = rktPos.dot(rktL0);
    rktVel.addScaledVector(rktL0, -vPerp * Math.min(0.10, 5 * dt));
    rktVel.addScaledVector(rktL0, -rPerp * 2.5 * dt);
  }

  // ── Orient rocket nose along velocity ─────────────────────────
  const spd = rktVel.length();
  if (spd > 0.01) {
    _rktDir.copy(rktVel).divideScalar(spd);
    rktGroup.quaternion.setFromUnitVectors(_rktUp, _rktDir);
  }
  rktGroup.position.copy(rktPos);

  // ── Exhaust — brighter & faster when fighting back ────────────
  const t   = performance.now();
  const fightBoost = rktFighting ? 1.35 : 1.0;
  const flickerSpd = rktFighting ? 0.048 : 0.028;
  _exhPlume.material.opacity = Math.min(1, (0.70 + 0.22 * Math.sin(t * flickerSpd)) * fightBoost);
  _exhCore.scale.y           = (0.75 + 0.50 * Math.sin(t * (rktFighting ? 0.062 : 0.041))) * fightBoost;

  // ── Record trail ──────────────────────────────────────────────
  if (++rktTick >= TRAIL_EVERY) {
    rktTick = 0;
    rktTrail.push(new THREE.Vector3().copy(rktPos));
    if (rktTrail.length > TRAIL_MAX) rktTrail.shift();
  }

  // ── Update trail geometry ─────────────────────────────────────
  const cnt = rktTrail.length;
  for (let i = 0; i < cnt; i++) {
    rktTrBuf[i*3]   = rktTrail[i].x;
    rktTrBuf[i*3+1] = rktTrail[i].y;
    rktTrBuf[i*3+2] = rktTrail[i].z;
  }
  rktTrAttr.needsUpdate = true;
  rktTrGeo.setDrawRange(0, cnt);
  if (cnt > 1) rktTrLine.computeLineDistances();
}

// ─────────────────────────────────────────────────────────────
//  FOLLOW CAMERA
// ─────────────────────────────────────────────────────────────
let followCam = false;
const _fcTarget  = new THREE.Vector3();
const _fcLookAt  = new THREE.Vector3();
const _fcUp      = new THREE.Vector3(0, 1, 0);
const camToggleEl = document.getElementById('cam-toggle');

function setFollowCam(on) {
  followCam = on;
  orbit.enabled = !on;
  camToggleEl.classList.toggle('active', on);
  camToggleEl.textContent = on ? '[ F ]  ROCKET VIEW' : '[ F ]  UNIVERSE VIEW';
  window.posthog?.capture('camera_mode_changed', { mode: on ? 'rocket_follow' : 'universe' });
  if (!on) {
    // Smooth restore handled by orbit; snap look-at back to origin
    orbit.target.set(0, 0, 0);
  }
}

camToggleEl.addEventListener('click', () => setFollowCam(!followCam));

function updateFollowCam() {
  if (!followCam || !rktGroup.visible) return;

  const spd = rktVel.length();
  if (spd < 0.01) return;

  const fwd   = rktVel.clone().normalize();

  // Right axis relative to world up; fall back if nearly parallel
  let right = new THREE.Vector3().crossVectors(fwd, _fcUp);
  if (right.lengthSq() < 0.0001) right.set(1, 0, 0);
  right.normalize();

  // Camera-local up (perpendicular to both fwd and right)
  const camUp = new THREE.Vector3().crossVectors(right, fwd).normalize();

  // Sit 22 units behind, 5 units above the rocket
  _fcTarget.copy(rktPos)
    .addScaledVector(fwd,   -22)
    .addScaledVector(camUp,   5);

  // Look 14 units ahead of the rocket (not at it — more cinematic)
  _fcLookAt.copy(rktPos).addScaledVector(fwd, 14);

  // Smooth chase — position lerps faster than look-at for a slight lag feel
  camera.position.lerp(_fcTarget, 0.07);
  const curLook = new THREE.Vector3();
  camera.getWorldDirection(curLook);
  const desiredDir = _fcLookAt.clone().sub(camera.position).normalize();
  curLook.lerp(desiredDir, 0.10).normalize();
  camera.lookAt(camera.position.clone().add(curLook));
}

// ─────────────────────────────────────────────────────────────
//  RENDER LOOP
// ─────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let fFrames = 0, fLast = performance.now();
let prevElapsed = 0;

// Slow pulse animation on core
let pulseT = 0;

(function loop() {
  requestAnimationFrame(loop);

  const elapsed = clock.getElapsedTime();
  const dt      = Math.min(elapsed - prevElapsed, 0.05); // cap to avoid jumps
  prevElapsed   = elapsed;
  pulseT += dt;

  if (galaxyMat) {
    galaxyMat.uniforms.uTime.value  = elapsed;
    galaxyMat.uniforms.uPulse.value = 0.6 + 0.4 * Math.sin(pulseT * 0.7);
  }
  if (jetMat) {
    jetMat.uniforms.uTime.value = elapsed;
  }

  // Slowly rotate nebula sprites for atmosphere
  nebulaGroup.rotation.y = elapsed * 0.018;

  tickGravity();
  updateRocket(dt);
  updateFollowCam();
  orbit.update();
  composer.render();

  // FPS counter
  fFrames++;
  const now = performance.now();
  if (now - fLast > 700) {
    fpsEl.textContent = Math.round(fFrames * 1000 / (now - fLast)) + ' FPS';
    fFrames = 0;
    fLast   = now;
  }
})();

// ─────────────────────────────────────────────────────────────
//  RESIZE
// ─────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  bloom.resolution.set(window.innerWidth, window.innerHeight);
});
</script>
